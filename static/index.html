<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Role-Bounded GitHub Agent Demo</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="min-h-screen bg-zinc-100 text-zinc-950">
    <main class="mx-auto flex min-h-screen w-full max-w-7xl flex-col px-5 py-6 md:px-8">
      <header class="mb-5 flex flex-col gap-4 border-b border-zinc-300 pb-5 md:flex-row md:items-end md:justify-between">
        <div>
          <p class="text-xs font-semibold uppercase tracking-[0.22em] text-teal-700">Scalekit-themed hackathon demo</p>
          <h1 class="mt-2 text-3xl font-semibold tracking-tight md:text-4xl">Role-bounded GitHub agents</h1>
        </div>
        <div id="active-user-badge" class="rounded-lg border border-zinc-300 bg-white px-5 py-3 shadow-sm">
          <p class="text-xs font-medium uppercase tracking-[0.18em] text-zinc-500">Acting as</p>
          <p id="active-user-name" class="mt-1 text-xl font-semibold text-zinc-950">Founder</p>
          <p id="active-user-scope" class="mt-1 text-sm text-zinc-600">Admin token</p>
        </div>
      </header>

      <section class="grid gap-5 lg:grid-cols-[360px_1fr]">
        <aside class="space-y-4">
          <section class="rounded-lg border border-zinc-300 bg-white p-4 shadow-sm">
            <div class="grid grid-cols-2 gap-2" id="user-tabs">
              <button class="user-tab rounded-md border px-3 py-3 text-left text-sm transition" data-user-id="founder">
                <span class="block font-semibold">Founder</span>
                <span class="text-xs">Admin token</span>
              </button>
              <button class="user-tab rounded-md border px-3 py-3 text-left text-sm transition" data-user-id="sde">
                <span class="block font-semibold">SDE</span>
                <span class="text-xs">Write token</span>
              </button>
              <button class="user-tab rounded-md border px-3 py-3 text-left text-sm transition" data-user-id="hr">
                <span class="block font-semibold">HR</span>
                <span class="text-xs">Handbook writer</span>
              </button>
              <button class="user-tab rounded-md border px-3 py-3 text-left text-sm transition" data-user-id="intern">
                <span class="block font-semibold">Intern</span>
                <span class="text-xs">Read only</span>
              </button>
            </div>
          </section>

          <section class="rounded-lg border border-zinc-300 bg-white p-4 shadow-sm">
            <h2 class="text-sm font-semibold text-zinc-950">Prompt</h2>
            <form id="chat-form" class="mt-3 space-y-3">
              <textarea
                id="message-input"
                class="min-h-28 w-full resize-none rounded-md border border-zinc-300 bg-white px-3 py-3 text-sm leading-6 text-zinc-950 outline-none ring-teal-500 transition placeholder:text-zinc-400 focus:border-teal-600 focus:ring-2"
                autocomplete="off"
              >Triage open issues and act on what you can</textarea>
              <button
                id="send-button"
                class="h-11 w-full rounded-md bg-teal-700 px-4 text-sm font-semibold text-white transition hover:bg-teal-800 disabled:cursor-not-allowed disabled:bg-zinc-300 disabled:text-zinc-500"
                type="submit"
              >
                Send
              </button>
            </form>
            <div class="mt-4 flex flex-wrap gap-2" id="prompt-suggestions">
              <button class="prompt-chip rounded-full border border-zinc-300 px-3 py-1.5 text-xs font-medium text-zinc-700 transition hover:border-teal-600 hover:text-teal-700" type="button" data-prompt="Triage open issues and act on what you can">Triage open issues</button>
              <button class="prompt-chip rounded-full border border-zinc-300 px-3 py-1.5 text-xs font-medium text-zinc-700 transition hover:border-teal-600 hover:text-teal-700" type="button" data-prompt="Review PR #1 and act on it">Review PR #1</button>
              <button class="prompt-chip rounded-full border border-zinc-300 px-3 py-1.5 text-xs font-medium text-zinc-700 transition hover:border-teal-600 hover:text-teal-700" type="button" data-prompt="Summarize what the team is working on">Summarize team work</button>
            </div>
          </section>
        </aside>

        <section class="grid gap-5 xl:grid-cols-2">
          <article class="rounded-lg border border-zinc-300 bg-white p-5 shadow-sm">
            <div class="mb-3 flex items-center justify-between gap-3">
              <h2 class="text-base font-semibold text-zinc-950">Agent Reply</h2>
              <span id="reply-state" class="rounded-full bg-zinc-100 px-3 py-1 text-xs font-medium text-zinc-600">Idle</span>
            </div>
            <pre id="agent-reply" class="min-h-[520px] whitespace-pre-wrap rounded-md border border-zinc-200 bg-zinc-50 p-4 text-sm leading-6 text-zinc-800">Send a message to run the agent.</pre>
          </article>

          <article class="rounded-lg border border-zinc-300 bg-white p-5 shadow-sm">
            <div class="mb-3 flex items-center justify-between gap-3">
              <h2 class="text-base font-semibold text-zinc-950">Tool Log</h2>
              <span id="tool-count" class="rounded-full bg-zinc-100 px-3 py-1 text-xs font-medium text-zinc-600">0 calls</span>
            </div>
            <div id="tool-log" class="min-h-[520px] rounded-md border border-zinc-200 bg-zinc-50 p-3 text-sm text-zinc-700">
              No tool calls yet.
            </div>
          </article>
        </section>
      </section>
    </main>

    <script>
      const tabs = Array.from(document.querySelectorAll(".user-tab"));
      const promptChips = Array.from(document.querySelectorAll(".prompt-chip"));
      const form = document.getElementById("chat-form");
      const input = document.getElementById("message-input");
      const sendButton = document.getElementById("send-button");
      const replyPanel = document.getElementById("agent-reply");
      const toolLogPanel = document.getElementById("tool-log");
      const activeUserName = document.getElementById("active-user-name");
      const activeUserScope = document.getElementById("active-user-scope");
      const replyState = document.getElementById("reply-state");
      const toolCount = document.getElementById("tool-count");

      let activeUserId = "founder";

      const users = {
        founder: {label: "Founder", scope: "Admin token"},
        sde: {label: "SDE", scope: "Write token"},
        hr: {label: "HR", scope: "Code read, handbook write"},
        intern: {label: "Intern", scope: "Public read only"}
      };

      function escapeHtml(value) {
        return String(value)
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#039;");
      }

      function renderTabs() {
        tabs.forEach((tab) => {
          const isActive = tab.dataset.userId === activeUserId;
          tab.className = [
            "user-tab rounded-md border px-3 py-3 text-left text-sm transition",
            isActive
              ? "border-teal-700 bg-teal-700 text-white shadow-sm"
              : "border-zinc-300 bg-white text-zinc-700 hover:border-teal-600 hover:text-teal-700"
          ].join(" ");
        });
        activeUserName.textContent = users[activeUserId].label;
        activeUserScope.textContent = users[activeUserId].scope;
      }

      function renderToolLog(toolLog) {
        toolCount.textContent = `${toolLog.length} ${toolLog.length === 1 ? "call" : "calls"}`;

        if (!toolLog || toolLog.length === 0) {
          toolLogPanel.textContent = "No tool calls yet.";
          return;
        }

        toolLogPanel.innerHTML = toolLog.map((entry, index) => {
          const badgeClass = entry.allowed
            ? "bg-emerald-100 text-emerald-800 ring-emerald-200"
            : "bg-red-100 text-red-800 ring-red-200";
          const badgeText = entry.allowed ? "allowed" : "denied";
          const args = entry.args ? JSON.stringify(entry.args, null, 2) : "{}";

          return `
            <div class="mb-3 rounded-md border border-zinc-200 bg-white p-3 last:mb-0">
              <div class="flex items-start justify-between gap-3">
                <div>
                  <p class="text-xs font-medium uppercase tracking-[0.14em] text-zinc-400">Step ${index + 1}</p>
                  <h3 class="mt-1 font-semibold text-zinc-950">${escapeHtml(entry.action)}</h3>
                </div>
                <span class="rounded-full px-2.5 py-1 text-xs font-semibold ring-1 ${badgeClass}">${badgeText}</span>
              </div>
              <dl class="mt-3 grid gap-2 text-xs leading-5">
                <div>
                  <dt class="font-semibold text-zinc-500">Target</dt>
                  <dd class="text-zinc-800">${escapeHtml(entry.target || "not specified")}</dd>
                </div>
                <div>
                  <dt class="font-semibold text-zinc-500">Scope decision</dt>
                  <dd class="text-zinc-800">${escapeHtml(entry.scope_decision || (entry.allowed ? "Allowed" : "Denied"))}</dd>
                </div>
                <div>
                  <dt class="font-semibold text-zinc-500">Result</dt>
                  <dd class="text-zinc-800">${escapeHtml(entry.result_summary || "")}</dd>
                </div>
              </dl>
              <details class="mt-3">
                <summary class="cursor-pointer text-xs font-medium text-zinc-500">Args</summary>
                <pre class="mt-2 overflow-x-auto rounded bg-zinc-100 p-2 text-[11px] leading-5 text-zinc-600">${escapeHtml(args)}</pre>
              </details>
            </div>
          `;
        }).join("");
      }

      tabs.forEach((tab) => {
        tab.addEventListener("click", () => {
          activeUserId = tab.dataset.userId;
          renderTabs();
        });
      });

      promptChips.forEach((chip) => {
        chip.addEventListener("click", () => {
          input.value = chip.dataset.prompt;
          input.focus();
        });
      });

      form.addEventListener("submit", async (event) => {
        event.preventDefault();

        const message = input.value.trim();
        if (!message) {
          return;
        }

        sendButton.disabled = true;
        sendButton.textContent = "Running";
        replyState.textContent = "Running";
        replyPanel.textContent = "Waiting for response...";
        toolLogPanel.textContent = "Waiting for tool log...";
        toolCount.textContent = "0 calls";

        try {
          const response = await fetch("/chat", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({user_id: activeUserId, message})
          });

          const data = await response.json();
          if (!response.ok) {
            throw new Error(data.detail || "Request failed");
          }
          replyPanel.textContent = data.final_reply || "No reply returned.";
          renderToolLog(data.tool_log || []);
          replyState.textContent = "Complete";
        } catch (error) {
          replyPanel.textContent = `Request failed: ${error.message}`;
          toolLogPanel.textContent = "No tool log returned.";
          toolCount.textContent = "0 calls";
          replyState.textContent = "Error";
        } finally {
          sendButton.disabled = false;
          sendButton.textContent = "Send";
        }
      });

      renderTabs();
    </script>
  </body>
</html>
